<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRVision AI | Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="justify-content: center; align-items: center; min-height: 100vh; flex-direction: column;">
    <div class="bg-animation"></div>
    <div id="toastContainer" class="toast-container"></div>

    <div class="logo mb-8 mt-8 justify-center">
        <i class="fa-solid fa-shapes" style="font-size: 32px;"></i>
        <h1 style="font-size: 32px;">HR<span>Vision</span></h1>
    </div>

    <div class="glass-card hover-lift" style="width: 100%; max-width: 420px; padding: 40px; margin: 0 20px;">
        <div class="text-center mb-8">
            <h2 style="font-size: 24px;">Welcome Back</h2>
            <p class="text-secondary mt-2 text-sm">Sign in to the intelligence engine.</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label style="display: block; font-weight: 500; font-size: 14px; margin-bottom: 8px; color: var(--text-muted);">Email Address</label>
                <input type="email" id="email" class="glass-input" required placeholder="admin@hrvision.ai">
            </div>
            <div class="mb-6">
                <label style="display: block; font-weight: 500; font-size: 14px; margin-bottom: 8px; color: var(--text-muted);">Password</label>
                <input type="password" id="password" class="glass-input" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="action-btn" style="width: 100%; justify-content: center;">
                <span>Authenticate</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-secondary">
            Don't have an account? <a href="/signup" style="color: var(--primary); text-decoration: none; font-weight: 600;">Request Access</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const res = await fetch('http://localhost:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                if (!res.ok) {
                    let errorMsg = "Authentication failed";
                    try {
                        const data = await res.json();
                        errorMsg = data.detail || data.error || errorMsg;
                    } catch (parseErr) {
                        const text = await res.text();
                        errorMsg = text || errorMsg;
                    }
                    throw new Error(errorMsg);
                }
                
                const data = await res.json();
                localStorage.setItem('hr_vision_token', data.access_token);
                localStorage.setItem('hr_vision_user', data.name);
                
                window.location.href = '/';
            } catch (err) {
                const toast = document.createElement('div');
                toast.className = 'toast error show';
                toast.innerHTML = `<div class="toast-icon"><i class="fa-solid fa-circle-exclamation"></i></div> <span style="font-weight: 500;">${err.message}</span>`;
                document.getElementById('toastContainer').appendChild(toast);
                setTimeout(() => { toast.remove(); }, 3500);
            }
        });
    </script>
</body>
</html>
